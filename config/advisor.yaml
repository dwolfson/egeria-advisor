data_sources:
  egeria_python_path: /Users/dwolfson/localGit/egeria-python
  include_patterns:
    - "*.py"
    - "*.md"
  exclude_patterns:
    - "**/__pycache__/**"
    - "**/deprecated/**"
    - "**/.git/**"
    - "**/.venv/**"
    - "**/venv/**"
    - "**/node_modules/**"
    - "**/.pytest_cache/**"
    - "**/.mypy_cache/**"
    - "**/.tox/**"
    - "**/build/**"
    - "**/dist/**"
    - "**/*.egg-info/**"
    - "**/.eggs/**"

vector_store:
  host: localhost
  port: 19530
  # Collections are defined in advisor/collection_config.py
  # Active collections (6 total):
  #   1. pyegeria - Python SDK code and tests
  #   2. pyegeria_cli - Hey Egeria CLI commands
  #   3. pyegeria_drE - Dr. Egeria markdown translator
  #   4. egeria_java - Java codebase (OMAS, OMAG, OMRS)
  #   5. egeria_docs - Documentation, guides, tutorials
  #   6. egeria_workspaces - Jupyter notebooks, examples, configs

llm:
  provider: ollama
  base_url: http://localhost:11434
  models:
    query: llama3.1:8b
    code: codellama:13b
    conversation: llama3.1:8b
    maintenance: codellama:13b
  parameters:
    temperature: 0.3             # Lowered from 0.7 for factual answers
    max_tokens: 3000             # Increased from 2000
    top_p: 0.9
    top_k: 40
    repeat_penalty: 1.2          # Increased from 1.1 to reduce repetition
    timeout: 60
  model_overrides:
    code:
      temperature: 0.5
      max_tokens: 3000
    maintenance:
      temperature: 0.4
      max_tokens: 3000

embeddings:
  backend: pytorch  # pytorch or onnx
  model: sentence-transformers/all-MiniLM-L6-v2
  device: auto  # Auto-detect best device: CUDA, ROCm (AMD), MPS (Apple), or CPU
  batch_size: 64
  normalize: true
  max_length: 512
  # ONNX-specific settings (used when backend=onnx)
  onnx:
    model_path: models/all-MiniLM-L6-v2.onnx
    providers: null  # null for auto-detection, or list: ["CUDAExecutionProvider", "CPUExecutionProvider"]

rag:
  chunk_size: 512
  chunk_overlap: 50
  retrieval:
    top_k: 10              # Increased from 5 for more sources
    min_score: 0.30        # Keep at 0.30 - file type boosting handles quality
    rerank: false
  context:
    max_length: 6000       # Increased from 4000 for more context
    format_style: detailed
    include_metadata: true
  generation:
    temperature: 0.3       # Lowered from 0.7 for more focused answers
    max_tokens: 3000       # Increased from 2000 for longer answers
    stream: false

agents:
  query_agent:
    enabled: true
    model: llama3.1:8b
    temperature: 0.3
    max_iterations: 3
  code_agent:
    enabled: true
    model: codellama:13b
    temperature: 0.5
    max_iterations: 5
  conversation_agent:
    enabled: true
    model: llama3.1:8b
    temperature: 0.7
    max_iterations: 10
    memory_window: 10
  maintenance_agent:
    enabled: true
    model: codellama:13b
    temperature: 0.4
    max_iterations: 5

cli:
  default_agent: auto
  interactive_mode: true
  output_format: rich
  show_citations: true
  show_confidence: true
  max_response_length: 5000

observability:
  mlflow:
    enabled: true
    tracking_uri: http://localhost:5025
    experiment_name: egeria-advisor
    log_system_metrics: true
    log_query_metrics: true
    auto_log: true
  phoenix:
    enabled: false
    collector_endpoint: http://localhost:6006
    trace_all_queries: false

logging:
  level: INFO
  format: "<green>{time:YYYY-MM-DD HH:mm:ss}</green> | <level>{level: <8}</level> | <cyan>{name}</cyan>:<cyan>{function}</cyan>:<cyan>{line}</cyan> - <level>{message}</level>"
  file: logs/advisor.log
  rotation: "10 MB"
  retention: "1 week"
