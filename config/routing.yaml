# Special rules for edge cases
special_rules:
  how_does_differ:
    pattern: "how does"
    check_terms:
      - "differ"
      - "compare"
    if_match: "comparison"
    if_no_match: null

  tell_me_about_domain:
    pattern: "tell me about"
    check_domain_category: "egeria_concepts"
    if_match: "explanation"
    if_no_match: "general"

  how_does_system:
    pattern: "how does"
    check_domain_category: "general_terms"
    if_match: "general"
    if_no_match: "explanation"

# Follow-up question templates by query type
followup_templates:
  concept:
    - "Would you like to see a code example?"
    - "Do you want to see how this is implemented?"
    - "Should I show you related concepts?"
    - "Would you like to see the type definition?"
  
  code:
    - "Would you like to see more examples?"
    - "Do you want to see the full implementation?"
    - "Should I explain how this works?"
    - "Would you like to see related methods?"
  
  example:
    - "Would you like to see another example?"
    - "Do you want to see a more complex use case?"
    - "Should I explain the code in detail?"
    - "Would you like to see related examples?"
  
  tutorial:
    - "Would you like to see the next step?"
    - "Do you want to see a complete example?"
    - "Should I explain any specific part?"
    - "Would you like to see troubleshooting tips?"
  
  cli:
    - "Would you like to see an example?"
    - "Do you want to see related commands?"
    - "Should I show you the command options?"
    - "Would you like to see common use cases?"
  
  general:
    - "Would you like to see an example?"
    - "Do you want more details on any aspect?"
    - "Should I show you related topics?"
    - "Would you like to see the documentation?"

# Response format templates
response_formats:
  succinct_with_options:
    structure: |
      ## Quick Answer
      [Brief, direct answer to the question - 2-3 sentences max]
      
      ## What would you like to know more about?
      1. [Option 1 - e.g., "See a code example"]
      2. [Option 2 - e.g., "View related commands"]
      3. [Option 3 - e.g., "Read the full documentation"]
      4. [Option 4 - e.g., "Understand the parameters"]
      
      Just let me know the number or describe what you'd like!
  
  clarification_request:
    structure: |
      I found information about "{topic}" in multiple areas. To give you the best answer, could you clarify what you're looking for?
      
      1. **Documentation** - Conceptual explanation and architecture
      2. **Code Examples** - Working Python/Java code
      3. **CLI Commands** - Command-line usage
      4. **Tutorials** - Step-by-step guides
      
      Which would be most helpful? (Choose a number or describe your need)
  
  no_clear_match:
    structure: |
      I'm not quite sure what you're looking for. Could you help me understand by choosing one:
      
      1. **Explain the concept** - What is it and how does it work?
      2. **Show me code** - Give me implementation examples
      3. **Guide me through it** - Step-by-step tutorial
      4. **Troubleshoot** - Help me fix a problem
      
      Or feel free to rephrase your question with more details!

# Trigger word documentation (shown to users when helpful)
trigger_words:
  documentation:
    keywords: ["documentation", "docs", "guide", "tutorial", "explain", "what is"]
    example: 'Try: "Show me the documentation for create_glossary"'
  
  code:
    keywords: ["code", "implementation", "example", "show me", "how to"]
    example: 'Try: "Show me code for creating a glossary"'
  
  cli:
    keywords: ["command", "cli", "hey-egeria", "terminal"]
    example: 'Try: "What are the hey-egeria commands for glossaries?"'
  
  examples:
    keywords: ["example", "demo", "sample", "notebook", "workspace"]
    example: 'Try: "Show me an example of using glossaries"'