      - "standard"
    comparison:
      - "difference between"
      - "compare"
      - "versus"
      - "vs"
      - "differ from"
      - "better"
      - "which"
      - "choose between"
    debugging:
      - "why isn't"
      - "isn't working"
      - "not working"
      - "getting an error"
      - "how do i fix"
      - "troubleshoot"
      - "fix"
