# Query Routing Configuration
# This file defines patterns and domain terms for intelligent query routing

# Confidence thresholds for routing decisions
confidence_thresholds:
  high_confidence: 0.75      # Clear routing decision
  medium_confidence: 0.50    # Acceptable but could clarify
  low_confidence: 0.30       # Should ask for clarification
  ambiguous: 0.50            # Multiple equally-matched routes

# Clarification settings
clarification:
  enabled: true
  ask_when_confidence_below: 0.50
  ask_when_multiple_routes: true
  max_route_options: 3

# Query patterns organized by priority and query type
# Priority levels: critical (1), high (2), medium (3), low (4), fallback (5)
query_patterns:
  critical:
    quantitative:
      - "how many lines of code"
      - "lines of code"
      - "what is the average"
      - "what's the average"
    debugging:
      - "why isn't this working"
      - "why isn't my"
      - "i'm getting an error when"
      - "getting an error when"
    best_practice:
      - "what is the best practice"
      - "what are the best practices"
      - "recommended approach for"
    comparison:
      - "how does x differ from"
      - "how does x compare to"
      - "differ from"

  high:
    report:
      - "generate report"
      - "create report"
      - "run report"
      - "show report"
      - "report on"
      - "get report"
      - "produce report"
      - "make report"
      - "list reports"
      - "available reports"
      - "what reports"
    command:
      - "run command"
      - "execute command"
      - "invoke"
      - "call"
      - "run the"
      - "execute the"
      - "perform"
      - "do"
    quantitative:
